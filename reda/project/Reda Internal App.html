<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reda — Internal Team App</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  html, body { margin: 0; padding: 0; background: #1a1a1a; font-family: 'Montserrat', system-ui, sans-serif; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  input { font-family: inherit; }

  @keyframes redaFade {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes redaSheet {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }

  /* Hide scrollbars but keep scrolling */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 2px; }

  /* Splash before React mounts */
  #boot {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #0A0A0A; color: white;
    font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 32px;
    letter-spacing: -0.025em;
  }
</style>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" style="width:100%;height:100%;background:#0A0A0A">
    <rect x="72" y="72" width="96" height="96" rx="14" fill="#0A0A0A" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M96 100h36a18 18 0 0 1 0 36h-10l16 22h-13l-16-22h-4v22H96z" fill="#FFFFFF"/>
    <path d="M150 150l11-7-11-7z" fill="#E63027"/>
  </svg>
</template>
</head>
<body>
<div id="boot">Reda</div>
<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Theme + data -->
<script src="theme.js"></script>
<script src="data.js"></script>

<!-- Starter components -->
<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- Reda components -->
<script type="text/babel" src="components.jsx"></script>

<!-- Role flows -->
<script type="text/babel" src="agent.jsx"></script>
<script type="text/babel" src="dispatcher.jsx"></script>
<script type="text/babel" src="admin.jsx"></script>
<script type="text/babel" src="warehouse.jsx"></script>

<!-- Main app last -->
<script type="text/babel" src="app.jsx"></script>

<script>
  // Remove boot splash after a tick
  setTimeout(() => { const b = document.getElementById('boot'); if (b) b.remove(); }, 1200);
</script>
</body>
</html>
